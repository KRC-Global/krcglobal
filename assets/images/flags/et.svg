<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- 에티오피아 국기: 녹색, 노란색, 빨간색 가로 줄무늬와 중앙 파란 원 -->
  <!-- 녹색 상단 -->
  <rect width="1200" height="200" fill="#078930"/>
  <!-- 노란색 중앙 -->
  <rect y="200" width="1200" height="200" fill="#FCDD09"/>
  <!-- 빨간색 하단 -->
  <rect y="400" width="1200" height="200" fill="#DA121A"/>
  <!-- 중앙 파란 원 -->
  <circle cx="600" cy="300" r="140" fill="#0F47AF"/>
  <!-- 노란색 별 (5각별) -->
  <path d="M 600 190 L 620 250 L 680 250 L 635 285 L 655 345 L 600 310 L 545 345 L 565 285 L 520 250 L 580 250 Z" fill="#FCDD09"/>
</svg>
