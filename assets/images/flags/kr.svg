<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Korean Flag (Taegukgi) - Circle version for flag display -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- White background -->
    <rect width="512" height="512" fill="#FFFFFF"/>

    <!-- Taeguk (Yin-Yang symbol) -->
    <circle cx="256" cy="256" r="80" fill="#CD2E3A"/>
    <path d="M256 176 A40 40 0 0 1 256 256 A40 40 0 0 0 256 336 A80 80 0 0 1 256 176" fill="#0047A0"/>

    <!-- Geon (건) - Upper left trigram - Heaven (3 solid lines) -->
    <g transform="translate(120, 120) rotate(-45, 40, 40)">
      <rect x="10" y="5" width="60" height="8" fill="#000000"/>
      <rect x="10" y="20" width="60" height="8" fill="#000000"/>
      <rect x="10" y="35" width="60" height="8" fill="#000000"/>
    </g>

    <!-- Gon (곤) - Lower right trigram - Earth (3 broken lines) -->
    <g transform="translate(352, 352) rotate(-45, 40, 40)">
      <rect x="10" y="5" width="25" height="8" fill="#000000"/>
      <rect x="45" y="5" width="25" height="8" fill="#000000"/>
      <rect x="10" y="20" width="25" height="8" fill="#000000"/>
      <rect x="45" y="20" width="25" height="8" fill="#000000"/>
      <rect x="10" y="35" width="25" height="8" fill="#000000"/>
      <rect x="45" y="35" width="25" height="8" fill="#000000"/>
    </g>

    <!-- Gam (감) - Upper right trigram - Water (solid-broken-solid) -->
    <g transform="translate(352, 120) rotate(45, 40, 40)">
      <rect x="10" y="5" width="25" height="8" fill="#000000"/>
      <rect x="45" y="5" width="25" height="8" fill="#000000"/>
      <rect x="10" y="20" width="60" height="8" fill="#000000"/>
      <rect x="10" y="35" width="25" height="8" fill="#000000"/>
      <rect x="45" y="35" width="25" height="8" fill="#000000"/>
    </g>

    <!-- Ri (리) - Lower left trigram - Fire (broken-solid-broken) -->
    <g transform="translate(120, 352) rotate(45, 40, 40)">
      <rect x="10" y="5" width="60" height="8" fill="#000000"/>
      <rect x="10" y="20" width="25" height="8" fill="#000000"/>
      <rect x="45" y="20" width="25" height="8" fill="#000000"/>
      <rect x="10" y="35" width="60" height="8" fill="#000000"/>
    </g>
  </g>
</svg>
