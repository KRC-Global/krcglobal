<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- 스리랑카 국기: 좌측 녹색/주황색 세로 줄무늬, 우측 적갈색 바탕 -->
  <rect width="1200" height="600" fill="#8D153A"/>
  <rect width="200" height="600" fill="#FFB81C"/>
  <rect width="100" height="600" fill="#00534E"/>
  <rect x="200" width="1000" height="600" fill="#8D153A"/>
  <!-- 노란색 테두리 -->
  <rect x="200" y="50" width="950" height="500" fill="none" stroke="#FFB81C" stroke-width="20"/>
</svg>
