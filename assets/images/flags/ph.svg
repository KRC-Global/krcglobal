<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- 필리핀 국기: 파랑 삼각형 (왼쪽), 빨강 (위), 흰색 (아래) + 태양과 별 -->
  <circle cx="500" cy="500" r="500" fill="#FFF"/>
  <!-- 빨강 상단 -->
  <polygon points="0,0 1000,0 1000,500 500,500" fill="#CE1126"/>
  <!-- 흰색 하단 -->
  <polygon points="0,1000 1000,1000 1000,500 500,500" fill="#FFF"/>
  <!-- 파랑 삼각형 -->
  <polygon points="0,0 0,1000 500,500" fill="#0038A8"/>
  
  <!-- 태양 (8개의 광선) -->
  <g fill="#FCD116" stroke="#FCD116">
    <circle cx="250" cy="500" r="80"/>
    <!-- 8개 광선 -->
    <polygon points="250,360 230,310 270,310"/>
    <polygon points="360,430 380,380 340,410"/>
    <polygon points="390,500 440,500 410,530"/>
    <polygon points="360,570 380,620 340,590"/>
    <polygon points="250,640 230,690 270,690"/>
    <polygon points="140,570 120,620 160,590"/>
    <polygon points="110,500 60,500 90,530"/>
    <polygon points="140,430 120,380 160,410"/>
  </g>
  
  <!-- 3개의 별 -->
  <g fill="#FCD116">
    <polygon points="120,250 135,290 180,290 142,315 157,355 120,330 83,355 98,315 60,290 105,290" transform="scale(0.6) translate(100, 200)"/>
    <polygon points="120,250 135,290 180,290 142,315 157,355 120,330 83,355 98,315 60,290 105,290" transform="scale(0.6) translate(250, 750)"/>
    <polygon points="120,250 135,290 180,290 142,315 157,355 120,330 83,355 98,315 60,290 105,290" transform="scale(0.6) translate(550, 550)"/>
  </g>
</svg>
